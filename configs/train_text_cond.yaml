# Text-conditional training (the "v10" recipe): CLIP-L text -> cross-attention.
# Mirrors scripts/slurm/submit_train_v10.sh.  Warm-starts from the unconditional SI checkpoint.

shard_dir: data/tucker_N256_R24_v2_medoid
out_dir: outputs/train_text_cond
init_from: outputs/train_uncond_si/ckpt_step625000.pt

# text condition (CLIP-L/14)
cond_dir: outputs/clip_caption_embs
cond_dim: 768
cond_n_views: 1
cond_n_tokens: 77        # CLIP context length
cond_dropout: 0.1

# model
depth: 12
hidden_size: 512
num_heads: 8
qk_norm: true

# diffusion / interpolant
target: eps
si: trig
t_sampling: uniform
t_clamp: 0.01

# optimization
optimizer: lion
lr: 3.0e-5
betas: [0.95, 0.98]
weight_decay: 0.0
ema_decay: 0.9999
grad_clip: 1.0
batch_size: 32
steps: 200000

log_every: 500
ckpt_every: 5000
